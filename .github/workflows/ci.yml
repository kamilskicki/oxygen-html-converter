name: Core CI

on:
  push:
    paths-ignore:
      - "docs/PRO_*.md"
      - "*.zip"
      - ".tmp-*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: core-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Validate Composer manifest
        run: composer validate --strict

      - name: Validate release metadata
        run: |
          npm run check:release-hygiene
          composer validate:readme

      - name: PHP unit tests
        run: composer test

      - name: JS tests
        run: npm run test:js

      - name: PHPCS
        run: composer lint:phpcs

      - name: PHPStan
        run: composer lint:phpstan

      - name: Audit dependencies
        run: |
          composer audit --locked
          npm audit --audit-level=high

      - name: Build verified plugin ZIP
        if: matrix.php-version == '8.2'
        run: npm run build:zip

      - name: Upload verified plugin ZIP
        if: matrix.php-version == '8.2'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0 # v7.0.1
        with:
          name: oxygen-html-converter-${{ github.sha }}
          path: artifacts/release/oxygen-html-converter-*.zip
          if-no-files-found: error
          retention-days: 14
