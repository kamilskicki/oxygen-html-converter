<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">HTML Converter WordPress.org banner</title>
  <desc id="desc">An HTML-to-Oxygen conversion symbol beside the HTML Converter wordmark on a clean blue gradient background.</desc>
  <metadata>Original HTML Converter project artwork. Licensed GPL-2.0-or-later.</metadata>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1544" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08172B"/>
      <stop offset=".56" stop-color="#0E315C"/>
      <stop offset="1" stop-color="#1263D1"/>
    </linearGradient>
    <radialGradient id="markGlow" cx="0" cy="0" r="1" gradientTransform="translate(300 250) rotate(90) scale(242)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4B8FF7" stop-opacity=".22"/>
      <stop offset="1" stop-color="#4B8FF7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0v64" fill="none" stroke="#FFFFFF" stroke-opacity=".055"/>
    </pattern>
    <linearGradient id="rule" x1="0" y1="0" x2="248" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#4B8FF7"/>
    </linearGradient>
  </defs>

  <!-- Clean gradient field with subtle technical structure. -->
  <rect width="1544" height="500" fill="url(#background)"/>
  <rect width="1544" height="500" fill="url(#grid)"/>
  <circle cx="300" cy="250" r="242" fill="url(#markGlow)"/>
  <path d="M1392-66 1606 58v248l-214 124-214-124V58Z" fill="none" stroke="#FFFFFF" stroke-opacity=".055" stroke-width="3"/>
  <path d="M1450 58 1551 116v117l-101 59-101-59V116Z" fill="none" stroke="#78E7D7" stroke-opacity=".13" stroke-width="3"/>

  <!-- Motif panel. -->
  <rect x="58" y="57" width="470" height="386" rx="74" fill="#071020" fill-opacity=".46" stroke="#FFFFFF" stroke-opacity=".10" stroke-width="2"/>
  <circle cx="291" cy="250" r="154" fill="none" stroke="#FFFFFF" stroke-opacity=".045" stroke-width="34"/>

  <!-- Same code-to-O mark as the icon, enlarged for the banner. -->
  <g transform="translate(70 26) scale(1.75)">
    <path d="M50 94 25 128l25 34" fill="none" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m85 94 25 34-25 34" fill="none" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m79 88-20 80" fill="none" stroke="#78E7D7" stroke-width="12" stroke-linecap="round"/>
    <path d="M108 122h13v-10l15 16-15 16v-10h-13Z" fill="#2DD4BF"/>
    <path fill="#4B8FF7" fill-rule="evenodd" d="m185 72 49 28v56l-49 28-49-28v-56Zm0 29-24 14v26l24 14 24-14v-26Z"/>
  </g>

  <!-- Wordmark: sized to remain comfortably legible in the 772 x 250 export. -->
  <g font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <text x="603" y="252" font-size="104" font-weight="750" letter-spacing="-3">
      <tspan fill="#FFFFFF">HTML</tspan><tspan dx="22" fill="#78E7D7">Converter</tspan>
    </text>
    <text x="610" y="326" fill="#E2E8F0" font-size="36" font-weight="450" letter-spacing=".2">HTML in. Native Oxygen out.</text>
  </g>
  <rect x="610" y="369" width="248" height="8" rx="4" fill="url(#rule)"/>
</svg>
