<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Converter asset browser proof</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: #07101f;
      color: #e7edf8;
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 44px;
    }
    main { max-width: 1032px; margin: 0 auto; }
    .eyebrow {
      color: #78e7d7;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .12em;
      margin: 0 0 10px;
      text-transform: uppercase;
    }
    h1 { font-size: 28px; line-height: 1.2; margin: 0; }
    .meta { color: #a9b9d0; font-size: 16px; margin: 8px 0 26px; }
    figure {
      background: #101b2e;
      border: 1px solid #2a3a53;
      border-radius: 16px;
      box-shadow: 0 18px 48px rgb(0 0 0 / 35%);
      margin: 0;
      overflow: hidden;
      padding: 28px;
    }
    img {
      display: block;
      height: 250px;
      width: 772px;
      max-width: 100%;
    }
    figcaption {
      color: #b9c7da;
      display: flex;
      font-size: 14px;
      justify-content: space-between;
      margin-top: 16px;
    }
    .ok { color: #78e7d7; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Headless Chromium render proof</p>
    <h1>WordPress.org banner preview</h1>
    <p class="meta">The PNG below is loaded from the generated asset on disk.</p>
    <figure>
      <img id="verified-asset" src="../banner-772x250.png" width="772" height="250" alt="HTML Converter WordPress.org banner">
      <figcaption>
        <span>banner-772x250.png</span>
        <span class="ok">natural size: 772 × 250 px</span>
      </figcaption>
    </figure>
  </main>
</body>
</html>
